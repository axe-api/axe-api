name: NPM Release Publish
on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/axe-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build the app
        run: |
          npm ci
          npm test
          npm run build
      - uses: JS-DevTools/npm-publish@v3
        with:
          package: packages/axe-api/package.json
          token: ${{ secrets.NPM_TOKEN }}
